<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060810">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>stole.cc</title>
  <link rel="stylesheet" href="glass-shared.css">
  <link rel="icon" href="pic.jpeg" type="image/jpeg">
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }

    .floating-images {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:1;
    }
    .floating-image {
      position:absolute; filter:grayscale(100%) contrast(1.15); opacity:0.55;
      pointer-events:auto; cursor:pointer; max-width:180px; max-height:180px; object-fit:cover;
      transition:filter .3s ease, opacity .3s ease;
    }
    .floating-image:hover { opacity:0.85; filter:grayscale(60%) contrast(1.3); }

    .hero {
      min-height: 100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow: hidden;
      padding:5rem 1.5rem 3rem;
      text-align:center; position:relative; z-index:10;
      gap: 1rem;
    }

    .hero-title {
      font-size: clamp(3.2rem, 11vw, 12rem);
      font-weight: 400;
      letter-spacing: 0.03em;
      margin: 0;
      text-transform: lowercase;
      white-space: nowrap;
      max-width: 100%;
      width: fit-content;
      background: linear-gradient(135deg, #fff 30%, var(--accent-aqua) 65%, var(--accent-violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      -webkit-text-stroke: 1px rgba(255,255,255,0.0);
      line-height: 1.0;
    }

    .hero-title-wrap {
      height: clamp(3.4rem, 11.6vw, 12.6rem);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      overflow: hidden;
    }

    .hero-sub {
      font-family: var(--font-body);
      font-size: clamp(0.68rem, 1.8vw, 0.88rem);
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--color-text-muted); opacity: 0.65; margin-top: 0.1rem;
    }

    .font-rotate-toggle { margin-top: 0.5rem; position: relative; z-index: 2; }

    .hero-divider { width: 100%; position: relative; z-index: 10; }

    .cards-section { position:relative; z-index:10; padding: 4rem 0 5rem; }
    .cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    @media (max-width:680px) { .cards-grid{grid-template-columns:1fr;} }

    .content-card {
      border-radius: var(--radius-2xl); padding: var(--space-xl);
      transition: transform var(--dur-mid) var(--ease-glass), box-shadow var(--dur-mid);
    }
    .content-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-float); }

    .card-label {
      font-size:var(--text-2xs); letter-spacing:0.16em; text-transform:uppercase;
      opacity:0.45; margin-bottom:var(--space-sm);
    }
    .card-title {
      font-family:var(--font-display); font-size:clamp(1.5rem,3vw,2rem);
      line-height:1.15; margin-bottom:var(--space-md);
    }

    .sotd-content { display:flex; flex-direction:column; gap:var(--space-md); }
    .sotd-empty, .motd-empty {
      font-size:var(--text-sm); opacity:0.42; font-style:italic; padding:var(--space-md) 0;
    }
    .spotify-embed-wrap {
      border-radius:var(--radius-lg); overflow:hidden;
      background:rgba(0,0,0,0.3); border:1px solid var(--glass-border-subtle);
    }
    .spotify-embed-wrap iframe { display:block; width:100%; border:none; }
    .sotd-meta, .motd-meta {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:.5rem; margin-top:var(--space-md);
    }
    .sotd-timestamp, .motd-timestamp {
      font-size:var(--text-2xs); letter-spacing:.1em; text-transform:uppercase; opacity:0.38;
    }

    .motd-body { padding-left:var(--space-md); border-left:2px solid rgba(180,144,245,0.5); }
    .motd-quote {
      font-family:var(--font-display); font-size:clamp(1.05rem,2.5vw,1.5rem);
      line-height:1.55; position:relative; padding-top:.25rem;
    }
    .motd-quote::before {
      content:'\201C'; font-size:3.2rem; line-height:0; position:absolute;
      top:.55rem; left:-1.4rem; opacity:0.15; color:var(--accent-violet);
      font-family:var(--font-display);
    }
    .motd-author {
      font-size:var(--text-sm); opacity:0.58; margin-top:var(--space-sm);
      display:flex; align-items:center; gap:.4rem;
    }
    .motd-author::before { content:'—'; opacity:0.5; }

    .card-actions { display:flex; gap:var(--space-sm); flex-wrap:wrap; margin-top:var(--space-lg); }

    /* Loading skeleton pulse */
    .card-loading {
      opacity: 0.35;
      font-size: var(--text-sm);
      font-style: italic;
      padding: var(--space-md) 0;
      animation: pulse-load 1.5s ease-in-out infinite;
    }
    @keyframes pulse-load {
      0%,100% { opacity:0.35; } 50% { opacity:0.6; }
    }

    @media (max-width:480px) {
      .hero { padding:3rem 1rem 2rem; }
      .hero-title { white-space: normal; text-align:center; }
    }
  </style>
</head>
<body>

    <div class="scene__blob scene__blob--1"></div>
    <div class="scene__blob scene__blob--2"></div>
    <div class="scene__blob scene__blob--3"></div>
    <div class="scene__blob scene__blob--4"></div>
  </div>

  <div class="floating-images" id="floatingContainer"></div>

  <div class="page-wrap">

      <div class="font-rotate-toggle anim-in" style="animation-delay:.22s">
        <button id="font-toggle-btn"
          class="glass glass-btn glass-btn--pink glass-btn--sm"
          onclick="toggleFontRotate()"
          title="Toggle font rotation">✦ fonts</button>
      </div>
    </header>

    <div class="hero-divider">
      <div class="container"><hr class="section-divider"></div>
    </div>

    <section class="cards-section">
      <div class="container">
        <div class="cards-grid">

          <!-- SOTD -->
          <div class="glass glass--dark content-card anim-in" style="animation-delay:.18s">
            <div class="card-label">Song of the Day</div>
            <h2 class="card-title">sotd.</h2>
            <div class="sotd-content" id="sotd-content">
              <p class="card-loading" id="sotd-loading">Loading…</p>
              <p class="sotd-empty" id="sotd-empty" style="display:none">No song for today yet.</p>
            </div>
            <div class="sotd-meta" id="sotd-meta" style="display:none">
              <span class="sotd-timestamp" id="sotd-timestamp"></span>
            </div>
            <div class="card-actions">
              <button class="glass glass-btn glass-btn--primary glass-btn--sm"
                id="sotd-share-btn" style="display:none" onclick="shareSotd()">
                ↗ Share
              </button>
            </div>
          </div>

          <!-- MOTD -->
          <div class="glass glass--dark content-card anim-in" style="animation-delay:.26s">
            <div class="card-label">Motto of the Day</div>
            <h2 class="card-title">motd.</h2>
            <div id="motd-content">
              <p class="card-loading" id="motd-loading">Loading…</p>
              <p class="motd-empty" id="motd-empty" style="display:none">No motto for today yet.</p>
              <div id="motd-body-wrap" style="display:none">
                <div class="motd-body">
                  <p class="motd-quote" id="motd-text"></p>
                  <p class="motd-author" id="motd-author"></p>
                </div>
              </div>
            </div>
            <div class="motd-meta" id="motd-meta" style="display:none">
              <span class="motd-timestamp" id="motd-timestamp"></span>
            </div>
            <div class="card-actions">
              <button class="glass glass-btn glass-btn--accent glass-btn--sm"
                id="motd-share-btn" style="display:none" onclick="shareMotd()">
                ↗ Share
              </button>
            </div>
          </div>

        </div>
      </div>
    </section>

  <script src="script.js"></script>
  <script>
    /* ── SUPABASE CONFIG ───────────────────────────────────── */
    const SUPABASE_URL      = 'https://wjooxweijejumgvutdvo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_8DBpQj9XnBBHj1mceSxGNA_zXbCiPXc';

    async function sbFetch(type) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/daily_content?type=eq.${type}&select=*&limit=1`,
        {
          headers: {
            'apikey':        SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type':  'application/json',
          }
        }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const rows = await res.json();
      return rows[0] || null;
    }

    /* ── FONT ROTATION ─────────────────────────────────────── */
    const FONTS = [
      "'Lobster Two', cursive",
      "'Fredoka', sans-serif",
      "'DM Serif Display', serif",
      "'Orbitron', sans-serif",
      "'Barlow Semi Condensed', sans-serif",
      "'Instrument Sans', sans-serif",
      "'DM Mono', monospace",
      "'Shadows Into Light', cursive",
      "'Yellowtail', cursive",
      "'News Cycle', sans-serif",
      "'Viga', sans-serif",
      "'Creepster', cursive",
      "'Great Vibes', cursive",
      "'Kapakana', sans-serif"
    ];
    let fontRotating = false;
    let fontInterval = null;
    let fontIdx      = FONTS.length - 1;
    const titleEl    = document.getElementById('hero-title');
    const toggleBtn  = document.getElementById('font-toggle-btn');

    function applyNextFont() {
      fontIdx = (fontIdx + 1) % FONTS.length;
      titleEl.style.fontFamily = FONTS[fontIdx];
    }
    function toggleFontRotate() {
      fontRotating = !fontRotating;
      if (fontRotating) {
        toggleBtn.className   = 'glass glass-btn glass-btn--pink-active glass-btn--sm';
        toggleBtn.textContent = '✦ fonts on';
        fontInterval = setInterval(applyNextFont, 300);
      } else {
        clearInterval(fontInterval);
        fontInterval = null;
        toggleBtn.className   = 'glass glass-btn glass-btn--pink glass-btn--sm';
        toggleBtn.textContent = '✦ fonts';
      }
    }

    /* ── HELPERS ───────────────────────────────────────────── */
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      return `${d}.${m}.${y}`;
    }
    function extractSpotifyId(url) {
      const m = url.match(/track\/([A-Za-z0-9]+)/);
      return m ? m[1] : null;
    }
    function buildSpotifyEmbed(id) {
      return `<iframe src="https://open.spotify.com/embed/track/${id}?utm_source=generator&theme=0"
        width="100%" height="80" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy" style="border-radius:12px"></iframe>`;
    }

    /* ── LOAD SOTD ─────────────────────────────────────────── */
    async function loadSOTD() {
      const loadingEl = document.getElementById('sotd-loading');
      const emptyEl   = document.getElementById('sotd-empty');
      const contentEl = document.getElementById('sotd-content');
      try {
        const data = await sbFetch('sotd');
        loadingEl.style.display = 'none';
        if (!data || !data.content) {
          emptyEl.style.display = '';
          return;
        }
        const id = extractSpotifyId(data.content);
        if (id) {
          const wrap = document.createElement('div');
          wrap.className = 'spotify-embed-wrap';
          wrap.innerHTML = buildSpotifyEmbed(id);
          contentEl.appendChild(wrap);
        } else {
          const a = document.createElement('a');
          a.href = data.content; a.target = '_blank';
          a.textContent = data.content;
          a.style.cssText = 'color:var(--accent-aqua);font-size:var(--text-sm);word-break:break-all;';
          contentEl.appendChild(a);
        }
        document.getElementById('sotd-meta').style.display     = 'flex';
        document.getElementById('sotd-share-btn').style.display = '';
        document.getElementById('sotd-timestamp').textContent   = formatDate(data.date);
        // store for share
        window._sotdUrl = data.content;
      } catch(e) {
        loadingEl.style.display = 'none';
        emptyEl.style.display = '';
        console.warn('SOTD load error:', e);
      }
    }

    /* ── LOAD MOTD ─────────────────────────────────────────── */
    async function loadMOTD() {
      const loadingEl = document.getElementById('motd-loading');
      const emptyEl   = document.getElementById('motd-empty');
      try {
        const data = await sbFetch('motd');
        loadingEl.style.display = 'none';
        if (!data || !data.content) {
          emptyEl.style.display = '';
          return;
        }
        document.getElementById('motd-body-wrap').style.display = '';
        document.getElementById('motd-text').textContent = data.content;
        const authorEl = document.getElementById('motd-author');
        if (data.source) { authorEl.textContent = data.source; }
        else              { authorEl.style.display = 'none'; }
        document.getElementById('motd-meta').style.display     = 'flex';
        document.getElementById('motd-share-btn').style.display = '';
        document.getElementById('motd-timestamp').textContent  = formatDate(data.date);
        // store for share
        window._motdText   = data.content;
        window._motdSource = data.source;
      } catch(e) {
        loadingEl.style.display = 'none';
        emptyEl.style.display = '';
        console.warn('MOTD load error:', e);
      }
    }

    /* ── SHARE ─────────────────────────────────────────────── */
    function shareSotd() {
      const url = window._sotdUrl;
      if (!url) return;
      if (navigator.share) navigator.share({ title:'Song of the Day — stole.cc', url });
      else { navigator.clipboard.writeText(url); showToast('info','Link copied!','Spotify link copied to clipboard.'); }
    }
    function shareMotd() {
      const text = `"${window._motdText}"${window._motdSource?' — '+window._motdSource:''}\n\nvia stole.cc`;
      if (navigator.share) navigator.share({ title:'Motto of the Day — stole.cc', text });
      else { navigator.clipboard.writeText(text); showToast('info','Copied!','Motto copied to clipboard.'); }
    }

    /* ── TOAST ─────────────────────────────────────────────── */
    function showToast(type, title, desc) {
      const icons = { success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
      const region = document.getElementById('toast-region');
      const t = document.createElement('div');
      t.className = `glass glass-toast glass-toast--${type}`;
      t.innerHTML = `<span class="glass-toast__icon">${icons[type]||'ℹ'}</span>
        <div class="glass-toast__body"><div class="glass-toast__title">${title}</div>
        ${desc?`<div class="glass-toast__desc">${desc}</div>`:''}</div>
        <span class="glass-toast__close">✕</span>`;
      region.appendChild(t);
      const dismiss = () => {
        t.classList.add('is-exiting');
        t.addEventListener('animationend',()=>t.remove(),{once:true});
      };
      t.querySelector('.glass-toast__close').addEventListener('click', dismiss);
      setTimeout(dismiss, 4000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadSOTD();
      loadMOTD();
    });
  </script>
</body>
