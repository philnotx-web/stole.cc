  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }

    .hero-countdown {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2.5rem; padding: 3rem 2rem;
      position: relative; z-index: 10;
      text-align: center;
    }

    .hero-countdown h1 {
      font-family: 'Kapakana', sans-serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 400; letter-spacing: 0.05em;
      background: linear-gradient(135deg, #fff 30%, var(--accent-rose) 65%, var(--accent-violet) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin: 0;
    }

    .countdown-target {
      font-size: var(--text-xs); letter-spacing: 0.18em;
      text-transform: uppercase; opacity: 0.4; margin-top: -1.5rem;
    }

    .flip-card.tick { animation: card-pulse 0.08s ease; }
    @keyframes card-pulse {
      0%{transform:scale(1);} 50%{transform:scale(1.04);} 100%{transform:scale(1);}
    }

    #ms-unit .flip-card { width:90px; font-size:1.6rem; }

    .floating-images {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:1;
    }
    .floating-image {
      position:absolute; filter:grayscale(100%) contrast(1.15); opacity:0.45;
      pointer-events:auto; cursor:pointer; max-width:150px; max-height:150px; object-fit:cover;
      transition:filter .3s ease, opacity .3s ease;
    }
    .floating-image:hover { opacity:0.75; filter:grayscale(60%) contrast(1.3); }
  </style>

        <div class="flip-unit" id="ms-unit">
          <div class="flip-card" id="milliseconds">000</div>

  <script src="script.js"></script>
  <script>
    const target = new Date('2027-05-01T00:00:00');
    let lastSec = -1;

    function update() {
      let diff = Math.max(0, target - new Date());
      const d  = Math.floor(diff / 86400000); diff %= 86400000;
      const h  = Math.floor(diff / 3600000);  diff %= 3600000;
      const m  = Math.floor(diff / 60000);    diff %= 60000;
      const s  = Math.floor(diff / 1000);
      const ms = diff % 1000;

      document.getElementById('days').textContent         = d;
      document.getElementById('hours').textContent        = String(h).padStart(2,'0');
      document.getElementById('minutes').textContent      = String(m).padStart(2,'0');
      document.getElementById('seconds').textContent      = String(s).padStart(2,'0');
      document.getElementById('milliseconds').textContent = String(ms).padStart(3,'0');

      if (s !== lastSec) {
        const secCard = document.getElementById('seconds');
        secCard.classList.remove('tick');
        void secCard.offsetWidth;
        secCard.classList.add('tick');
        lastSec = s;
      }
    }

    setInterval(update, 10);
    update();
  </script>
